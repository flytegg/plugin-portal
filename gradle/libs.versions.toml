# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/platforms.html#sub::toml-dependencies-format

[versions]
kotlin = "2.1.21"
shadow = "8.3.0"
spigot = "1.21.3-R0.1-SNAPSHOT"
lamp = "4.0.0-rc.17"
adventure = "4.24.0"
adventure-platform = "4.4.1"

[libraries]
kotlin-gradle-plugin = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
shadow-gradle-plugin = { module = "com.gradleup.shadow:shadow-gradle-plugin", version.ref = "shadow"}
spigot-api = { module = "org.spigotmc:spigot-api", version.ref = "spigot" }

lamp-common = { module = "io.github.revxrsal:lamp.common", version.ref = "lamp" }
lamp-bukkit = { module = "io.github.revxrsal:lamp.bukkit", version.ref = "lamp" }
lamp-brigadier = { module = "io.github.revxrsal:lamp.brigadier", version.ref = "lamp" }

adventure-api = { module = "net.kyori:adventure-api", version.ref = "adventure" }
adventure-minimessage = { module = "net.kyori:adventure-text-minimessage", version.ref = "adventure" }
adventure-bukkit = { module = "net.kyori:adventure-platform-bukkit", version.ref = "adventure-platform" }

[bundles]
lamp = ["lamp-common", "lamp-bukkit", "lamp-brigadier"]
adventure = ["adventure-api", "adventure-minimessage", "adventure-bukkit"]
